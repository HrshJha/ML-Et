<!DOCTYPE html>
<html>

<head>
    <title>Voice Crop Predictor</title>
</head>

<body>

    <h2>🎤 Speak Your Input (Max 4 sec)</h2>

    <button onclick="startRecording()">Start</button>
    <button onclick="stopRecording()">Stop & Predict</button>

    <p id="status"></p>
    <pre id="result"></pre>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

            mediaRecorder.start();
            document.getElementById("status").innerText = "Recording...";

            // auto stop after 4 sec
            setTimeout(() => {
                if (mediaRecorder.state === "recording") {
                    stopRecording();
                }
            }, 4000);
        }

        function stopRecording() {
            mediaRecorder.stop();

            mediaRecorder.onstop = async () => {

                const blob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });

                const formData = new FormData();
                formData.append("file", blob, "voice.webm");

                document.getElementById("status").innerText = "Processing...";

                const response = await fetch("http://localhost:8000/predict-audio", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                document.getElementById("result").innerText =
                    JSON.stringify(data, null, 2);

                document.getElementById("status").innerText = "Done (Check speaker 🔊)";
            };
        }
    </script>

</body>

</html>
